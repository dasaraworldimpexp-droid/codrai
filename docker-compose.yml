services:
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: codrai
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d codrai"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/codrai
      REDIS_URL: redis://redis:6379
      OLLAMA_BASE_URL: http://ollama:11434/v1
      OLLAMA_BASE_URLS: http://ollama:11434,http://host.docker.internal:11434,http://localhost:11434
      OLLAMA_MODEL: tinyllama
      CODRAI_REASONING_MODEL: llama3.1
      CODRAI_CODING_MODEL: deepseek-coder
      CODRAI_HEAVY_CODING_MODEL: qwen2.5-coder
      CODRAI_TINY_MODEL: tinyllama
      CODRAI_FAST_MODEL: deepseek-coder
      CODRAI_LOCAL_FIRST: "true"
      CODRAI_LOCAL_ROUTING: "true"
      OLLAMA_NUM_CTX: 2048
      OLLAMA_NUM_PREDICT: 384
      PROVIDER_MAX_ATTEMPTS: 2
      PROVIDER_RETRY_BASE_DELAY_MS: 500
      BROWSER_MAX_STEPS: 8
      BROWSER_SESSION_ROOT: /tmp/codrai-browser-sessions
      MEMORY_MAX_CONTENT_CHARS: 6000
    depends_on:
      postgres:
        condition: service_healthy
    command: ["npm", "run", "migrate"]

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 5000
      CLIENT_URL: http://localhost:5173
      PUBLIC_APP_URL: http://localhost:5173
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/codrai
      REDIS_URL: redis://redis:6379
      OLLAMA_BASE_URL: http://ollama:11434/v1
      OLLAMA_BASE_URLS: http://ollama:11434,http://host.docker.internal:11434,http://localhost:11434
      OLLAMA_MODEL: tinyllama
      CODRAI_REASONING_MODEL: llama3.1
      CODRAI_CODING_MODEL: deepseek-coder
      CODRAI_HEAVY_CODING_MODEL: qwen2.5-coder
      CODRAI_TINY_MODEL: tinyllama
      CODRAI_FAST_MODEL: deepseek-coder
      CODRAI_LOCAL_FIRST: "true"
      CODRAI_LOCAL_ROUTING: "true"
      OLLAMA_NUM_CTX: 2048
      OLLAMA_NUM_PREDICT: 384
      PROVIDER_MAX_ATTEMPTS: 2
      PROVIDER_RETRY_BASE_DELAY_MS: 500
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:5000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 20s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/codrai
      REDIS_URL: redis://redis:6379
      OLLAMA_BASE_URL: http://ollama:11434/v1
      OLLAMA_BASE_URLS: http://ollama:11434,http://host.docker.internal:11434,http://localhost:11434
      OLLAMA_MODEL: tinyllama
      CODRAI_REASONING_MODEL: llama3.1
      CODRAI_CODING_MODEL: deepseek-coder
      CODRAI_HEAVY_CODING_MODEL: qwen2.5-coder
      CODRAI_TINY_MODEL: tinyllama
      CODRAI_FAST_MODEL: deepseek-coder
      CODRAI_LOCAL_FIRST: "true"
      CODRAI_LOCAL_ROUTING: "true"
      OLLAMA_NUM_CTX: 2048
      OLLAMA_NUM_PREDICT: 384
      WORKER_CONCURRENCY: 1
      PROVIDER_MAX_ATTEMPTS: 2
      PROVIDER_RETRY_BASE_DELAY_MS: 750
      BROWSER_MAX_STEPS: 8
      BROWSER_SESSION_ROOT: /tmp/codrai-browser-sessions
      MEMORY_MAX_CONTENT_CHARS: 6000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: ["npm", "run", "start:workers"]

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"

volumes:
  postgres-data:
  redis-data:
