apiVersion: v1
kind: Namespace
metadata:
  name: codrai
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: codrai-backend
  namespace: codrai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: codrai-backend
  template:
    metadata:
      labels:
        app: codrai-backend
    spec:
      containers:
        - name: backend
          image: codrai-backend:latest
          ports:
            - containerPort: 5000
          envFrom:
            - secretRef:
                name: codrai-secrets
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: codrai-worker
  namespace: codrai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: codrai-worker
  template:
    metadata:
      labels:
        app: codrai-worker
    spec:
      containers:
        - name: worker
          image: codrai-worker:latest
          command: ["npm", "run", "start:workers"]
          envFrom:
            - secretRef:
                name: codrai-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: codrai-backend
  namespace: codrai
spec:
  selector:
    app: codrai-backend
  ports:
    - port: 80
      targetPort: 5000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: codrai-backend-hpa
  namespace: codrai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: codrai-backend
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
