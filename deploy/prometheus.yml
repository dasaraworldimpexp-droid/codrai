global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: codrai-backend
    metrics_path: /api/telemetry/metrics
    static_configs:
      - targets:
          - backend:5000

  - job_name: codrai-frontend-nginx
    metrics_path: /healthz
    static_configs:
      - targets:
          - codrai-edge:80
