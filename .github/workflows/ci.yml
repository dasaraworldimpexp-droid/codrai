name: CODRAI CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install frontend
        working-directory: frontend
        run: npm ci
      - name: Build frontend
        working-directory: frontend
        run: npm run build
      - name: Install backend
        working-directory: backend
        run: npm ci
      - name: Import backend
        working-directory: backend
        run: node -e "import('./src/app.js').then(() => console.log('backend import ok'))"
