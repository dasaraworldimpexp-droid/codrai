server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_types
    application/javascript
    application/json
    image/svg+xml
    text/css
    text/plain;

  location / {
    add_header Cache-Control "no-store";
    try_files $uri $uri/ /index.html;
  }

  location /assets/ {
    access_log off;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  location /health {
    access_log off;
    add_header Cache-Control "no-store";
    add_header Content-Type text/plain;
    return 200 "ok";
  }
}
